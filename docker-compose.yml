services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-aria
    ports:
      - "55000:5678"
    env_file:
      - .env
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - aria-network

volumes:
  n8n_data:


networks:
  aria-network:
    driver: bridge