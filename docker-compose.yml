services:
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    pull_policy: build
    container_name: aria-ai-service
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "8002:8002"
    depends_on:
      - chromadb
    networks:
      - aria-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-aria
    ports:
      - "55000:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
      - N8N_DEFAULT_TIMEZONE=America/Sao_Paulo
      - NODE_FUNCTION_ALLOW_EXTERNAL=ioredis
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
    networks:
      - aria-network

  chromadb:
    image: chromadb/chroma
    container_name: aria-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/.chroma
    networks:
      - aria-network
    restart: always

  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=${EVOLUTION_SERVER_URL}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution_pass@evolution-postgres:5432/evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis-aria:6379/6
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - aria-network
    depends_on:
      - redis
      - evolution-postgres

  evolution-postgres:
    image: postgres:16-alpine
    container_name: evolution-postgres
    restart: always
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution_pass
      POSTGRES_DB: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    networks:
      - aria-network

  redis:
    image: redis:7-alpine
    container_name: redis-aria
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aria-network

volumes:
  n8n_data:
  chroma_data:
  redis_data:
  evolution_instances:
  evolution_pgdata:

networks:
  aria-network:
    driver: bridge